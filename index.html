<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --rose:#d4735a;--rose-light:#f0cfc4;--rose-lighter:#fdf0eb;
  --rose-mid:#e0a090;--rose-dark:#7a3020;--rose-text:#a05040;

body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#fdf6f3 0%,#f5ddd5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{width:100%;max-width:460px;}
.hero{text-align:center;margin-bottom:28px;}
.hero-icon{width:72px;height:72px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;}
.hero-icon i{font-size:36px;color:#fff;}
.hero h1{font-size:22px;font-weight:800;color:var(--rose-dark);}
.hero p{font-size:13px;color:var(--rose-text);margin-top:5px;}
.card{background:#fff;border-radius:24px;padding:36px 32px;box-shadow:0 20px 60px rgba(212,115,90,.16);}
.tabs{display:flex;background:var(--rose-lighter);border-radius:14px;padding:4px;gap:4px;margin-bottom:28px;}
.tab-btn{flex:1;border:none;background:none;padding:10px;border-radius:11px;font-size:13px;font-weight:700;color:var(--rose-text);cursor:pointer;transition:all .2s;}
.tab-btn.active{background:#fff;color:var(--rose-dark);box-shadow:0 2px 8px rgba(212,115,90,.18);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--rose-text);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.form-group input{width:100%;border:1.5px solid var(--rose-light);border-radius:12px;padding:13px 15px;font-size:14px;color:#3a2020;background:var(--rose-lighter);outline:none;transition:border .2s,box-shadow .2s;font-family:inherit;}
.form-group input:focus{border-color:var(--rose);background:#fff;box-shadow:0 0 0 3px rgba(212,115,90,.14);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-primary{width:100%;background:var(--rose);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;}
.btn-primary:hover{background:var(--rose-dark);}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{background:var(--rose-mid);cursor:not-allowed;}
.alert{border-radius:10px;padding:10px 14px;font-size:13px;margin-top:14px;display:none;}
.alert.show{display:block;}
.alert.error{background:#ffebee;color:#b33;border:1px solid #ffaaaa;}
.alert.success{background:#edf7ee;color:#2e6b32;border:1px solid #a5d6a7;}
.alert.warn{background:#fff8e1;color:#b36000;border:1px solid #ffcc80;}
.pending-box{text-align:center;padding:20px 0;}
.pending-icon{font-size:52px;color:var(--rose);margin-bottom:14px;}
.pending-box h2{font-size:18px;font-weight:800;color:var(--rose-dark);margin-bottom:8px;}
.pending-box p{font-size:13px;color:var(--rose-text);line-height:1.6;}
.btn-secondary{background:var(--rose-lighter);color:var(--rose-dark);border:1px solid var(--rose-light);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;margin-top:18px;width:100%;font-family:inherit;}
/* spinner de carregamento inicial */
.init-loading{text-align:center;padding:20px 0;color:var(--rose-text);font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid var(--rose-light);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

    <h1>RW<span style="color:#4f9cf9;">Dent</span></h1>
    <p>Gestão Odontológica Inteligente</p>
  </div>

  <div class="card" id="main-card">
    <!-- Spinner enquanto verifica sessão -->
    <div id="panel-loading" class="init-loading">
      <div class="spinner"></div>
      Carregando...
    </div>

    <!-- TABS (escondidas até terminar o loading) -->
    <div class="tabs" id="tabs" style="display:none;">
      <button class="tab-btn active" onclick="switchMode('login')">Entrar</button>
      <button class="tab-btn" onclick="switchMode('cadastro')">Criar conta</button>

    <!-- LOGIN -->
    <div id="panel-login" style="display:none;">
      <div class="form-group">

        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>

    <div id="panel-cadastro" style="display:none;">

    <!-- AGUARDANDO APROVAÇÃO -->
    <div id="panel-pending" style="display:none;">

        <h2>Cadastro em análise</h2>

        <button class="btn-secondary" onclick="doLogout()"><i class="ti ti-logout"></i> Sair</button>
      </div>

    <!-- ERRO DE CONFIGURAÇÃO -->
    <div id="panel-error" style="display:none;">
      <div class="pending-box">
        <div class="pending-icon" style="color:#b33;"><i class="ti ti-alert-triangle"></i></div>
        <h2 style="color:#b33;">Banco não configurado</h2>
        <p id="error-detail" style="color:#b33;"></p>
        <p style="margin-top:10px;">Execute o SQL do <strong>SETUP_SUPABASE.md</strong> no Supabase e recarregue a página.</p>

<script>
// Inicializa Supabase com tratamento de erro
let _sb;
try {
  _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        storage: window.localStorage,
        storageKey: 'rwdent-auth',
        flowType: 'implicit',
        detectSessionInUrl: true,
        persistSession: true,
        autoRefreshToken: true
      }
    });
} catch(e) {
  showPanel('error');
  document.getElementById('error-detail').textContent = 'Erro ao conectar: ' + e.message;
}

function showPanel(name) {
  // Esconde tudo
  ['loading','login','cadastro','pending','error'].forEach(p => {
    const el = document.getElementById('panel-' + p);
    if(el) el.style.display = 'none';
  });
  document.getElementById('tabs').style.display = 'none';

  // Mostra o painel pedido + tabs quando necessário
  const target = document.getElementById('panel-' + name);
  if(target) target.style.display = '';

  if(name === 'login' || name === 'cadastro') {
    document.getElementById('tabs').style.display = '';
    // Marca aba correta
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i===0 && name==='login') || (i===1 && name==='cadastro'));
    });
  }
}

function switchMode(mode) {
  showPanel(mode);
}

// ── Verifica sessão ao carregar — NÃO bloqueia os botões ──
(async () => {
  if(!_sb) return;
  try {
    const { data:{ session } } = await _sb.auth.getSession();
    if(session) {
      await checkAndRedirect(session.user);
    } else {
      showPanel('login');
    }
  } catch(e) {
    console.warn('Erro na verificação de sessão:', e.message);
    showPanel('login');
  }
})();

async function checkAndRedirect(user) {
  try {
    const { data: perfil, error } = await _sb
      .from('clinicas')
      .select('status')
      .eq('user_id', user.id)
      .single();

    if(error || !perfil) {
      // Tabela não existe ainda ou sem perfil — mostra login normalmente
      showPanel('login');
      return;
    }

    if(perfil.status === 'aprovado') {
      window.location.replace('app.html');
    } else {
      showPanel('pending');
    }
  } catch(e) {
    console.warn('Erro ao verificar perfil:', e.message);
    showPanel('login');
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('btn-login');

  errEl.className = 'alert error'; errEl.textContent = '';
  if(!email || !pass) {
    errEl.textContent = 'Preencha e-mail e senha.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  document.getElementById('btn-login-text').textContent = 'Entrando...';

  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
    if(error) {
      errEl.textContent = error.message === 'Invalid login credentials'
        ? 'E-mail ou senha inválidos.'
        : error.message;
      errEl.classList.add('show');
      return;
    }
    await checkAndRedirect(data.user);
  } catch(e) {
    errEl.textContent = 'Erro de conexão: ' + e.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    document.getElementById('btn-login-text').textContent = 'Entrar';
  }
}

async function doCadastro() {
  const nome     = document.getElementById('cad-nome').value.trim();
  const clinica  = document.getElementById('cad-clinica').value.trim();
  const email    = document.getElementById('cad-email').value.trim();
  const pass     = document.getElementById('cad-pass').value;
  const pass2    = document.getElementById('cad-pass2').value;
  const telefone = document.getElementById('cad-telefone').value.trim();
  const msgEl    = document.getElementById('cad-msg');
  const btn      = document.getElementById('btn-cad');

  const show = (txt, type = 'error') => {
    msgEl.textContent = txt;
    msgEl.className = `alert ${type} show`;
  };

  msgEl.className = 'alert'; // limpa

  if(!nome || !clinica || !email || !pass) { show('Preencha todos os campos obrigatórios.'); return; }
  if(pass.length < 6)  { show('A senha deve ter no mínimo 6 caracteres.'); return; }
  if(pass !== pass2)   { show('As senhas não coincidem.'); return; }

  btn.disabled = true;
  document.getElementById('btn-cad-text').textContent = 'Enviando...';

  try {
    // 1. Cria conta no Supabase Auth
    const { data: signUpData, error: signUpError } = await _sb.auth.signUp({ email, password: pass });

    if(signUpError) {
      show(signUpError.message === 'User already registered'
        ? 'Este e-mail já está cadastrado.'
        : signUpError.message);
      return;
    }

    // 2. Faz login imediato para ter sessão ativa (necessário para o RLS)
    const { data: loginData, error: loginError } = await _sb.auth.signInWithPassword({ email, password: pass });

    if(loginError || !loginData.user) {
      show('Conta criada! Mas não conseguimos fazer login automático. Tente entrar manualmente.');
      showPanel('login');
      return;
    }

    // 3. Agora com sessão ativa, salva perfil da clínica como pendente
    const { error: err2 } = await _sb.from('clinicas').insert([{
      user_id  : loginData.user.id,
      nome_resp: nome,
      nome_cli : clinica,
      email,
      telefone,
      status   : 'pendente'
    }]);

    if(err2) {
      if(err2.message.includes('relation') || err2.message.includes('does not exist')) {
        show('Tabela "clinicas" não encontrada. Execute o SQL do SETUP_SUPABASE.md no Supabase primeiro.');
      } else {
        show('Erro ao salvar perfil: ' + err2.message);
      }
      return;
    }

    // 4. Sucesso — mostra tela de aguardando
    showPanel('pending');

  } catch(e) {
    show('Erro inesperado: ' + e.message);
  } finally {
    btn.disabled = false;
    document.getElementById('btn-cad-text').textContent = 'Solicitar cadastro';
  }
}

async function doLogout() {
  await _sb.auth.signOut();
  showPanel('login');
}

async function esqueciSenha(){
  const email = document.getElementById('login-email').value.trim();
  const errEl = document.getElementById('login-err');
  if(!email){ errEl.textContent='Digite seu e-mail primeiro.'; errEl.className='alert error show'; return; }
  errEl.className='alert'; errEl.textContent='';
  try {
    const { error } = await _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/app.html' });
    if(error){ errEl.textContent=error.message; errEl.className='alert error show'; return; }
    errEl.textContent='E-mail de recuperacao enviado! Verifique sua caixa de entrada.';
    errEl.className='alert success show';
  } catch(e) {
    errEl.textContent='Erro: '+e.message;
    errEl.className='alert error show';
  }
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    const loginVisible = document.getElementById('panel-login').style.display !== 'none';
    if(loginVisible) doLogin();
  }
});

(async()=>{
  const params = new URLSearchParams(window.location.search);
  if(params.get('demo') === 'true' && _sb){
    showPanel('loading');
    try {
      const { data, error } = await _sb.auth.signInWithPassword({

      });
      if(!error && data.user){
        sessionStorage.setItem('rwdent-demo','1');
        await checkAndRedirect(data.user);
      } else {
        showPanel('login');
        const errEl = document.getElementById('login-err');
        errEl.textContent = 'Conta de demonstração não disponível no momento.';
        errEl.classList.add('show');
      }
    } catch(e){
      showPanel('login');
    }
  }
})();
</script>
